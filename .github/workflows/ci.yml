name: ClinicFlow CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-test:
    name: Build, Test, Format
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore ClinicFlow.slnx

      - name: Build
        run: dotnet build ClinicFlow.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test ClinicFlow.slnx --configuration Release --no-build --no-restore --logger "trx;LogFileName=test-results.trx"

      - name: Format check
        run: dotnet format ClinicFlow.slnx --verify-no-changes --no-restore
